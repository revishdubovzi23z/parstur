# 5.3 / ROADMAP Stage 0.2: GitHub Actions CI workflow.
#
# Runs `lint`, `tests`, and `types` in parallel on every push to any
# branch and every PR to main.

name: CI

# Minimal CI gate. Runs on every PR to main and on every push to
# any branch so contributors see results immediately. Three jobs:
#
#   * lint   — ruff check + ruff format --check
#   * tests  — pytest suite
#   * types  — mypy on the strict-allow-list (see pyproject.toml).
#
# Jobs run in parallel where possible. The ruff job is the cheapest
# and runs first as a fail-fast.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          # Keep this version pinned in lock-step with .pre-commit-config.yaml
          # so contributors don't see "passes locally, fails CI" or vice versa.
          pip install ruff==0.6.9
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  tests:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Run pytest
        # Pytest exits with code 5 if no tests are collected; we always
        # have tests under tests/, so a non-zero exit is a real failure.
        run: pytest -v

  types:
    name: mypy (strict allow-list)
    runs-on: ubuntu-latest
    # The mypy job intentionally does NOT block PRs at first — it
    # surfaces type drift on the small allow-list (app_core, logger,
    # script_utils) without forcing the whole codebase to be typed
    # before merging anything. Promote to required once the
    # allow-list grows.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install mypy + runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy
      - name: Run mypy
        # The strict allow-list lives in pyproject.toml under
        # [[tool.mypy.overrides]]. As more modules acquire types,
        # add them to that list and to this command.
        run: mypy script_utils.py

  docker:
    name: docker build (smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build . -t par2:test

  frontend-build:
    # ROADMAP Stage 10.1 — typecheck + production build the new Vite/Vue 3/TS
    # SPA in `frontend/`. The legacy index.html is unaffected by this job;
    # we just need a green signal that the new bundle compiles before it is
    # shipped to /beta. Once Stage 10.7 lands and the SPA becomes the default
    # frontend, this job should be promoted to a hard required check.
    name: frontend (vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Run unit tests (Vitest)
        # ROADMAP Stage 10.2 — `vitest run` covers the new
        # `api/client.ts` and `stores/session.ts` modules. Build will
        # also typecheck but Vitest catches runtime regressions
        # `vue-tsc` cannot (e.g. headers merge logic, 401 side effects).
        run: npm test
      - name: Build
        run: npm run build
