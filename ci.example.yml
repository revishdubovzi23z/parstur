# 5.3: GitHub Actions CI workflow.
#
# This file is shipped at the repo root as `ci.example.yml` because
# the OAuth app that created the test branch lacks the `workflow`
# scope required to push to `.github/workflows/`. To activate it:
#
#   mkdir -p .github/workflows
#   git mv ci.example.yml .github/workflows/ci.yml
#   git commit -m "ci: enable GitHub Actions workflow"
#   git push
#
# After that, every push and PR runs `lint`, `tests`, and `types`
# in parallel.

name: CI

# Minimal CI gate. Runs on every PR to main and on every push to
# any branch so contributors see results immediately. Three jobs:
#
#   * lint   — ruff check + ruff format --check
#   * tests  — pytest suite
#   * types  — mypy on the strict-allow-list (see pyproject.toml).
#
# Jobs run in parallel where possible. The ruff job is the cheapest
# and runs first as a fail-fast.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          # Keep this version pinned in lock-step with .pre-commit-config.yaml
          # so contributors don't see "passes locally, fails CI" or vice versa.
          pip install ruff==0.6.9
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  tests:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Run pytest
        # Pytest exits with code 5 if no tests are collected; we always
        # have tests under tests/, so a non-zero exit is a real failure.
        run: pytest -v

  types:
    name: mypy (strict allow-list)
    runs-on: ubuntu-latest
    # The mypy job intentionally does NOT block PRs at first — it
    # surfaces type drift on the small allow-list (app_core, logger,
    # script_utils) without forcing the whole codebase to be typed
    # before merging anything. Promote to required once the
    # allow-list grows.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install mypy + runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy
      - name: Run mypy
        # The strict allow-list lives in pyproject.toml under
        # [[tool.mypy.overrides]]. As more modules acquire types,
        # add them to that list and to this command.
        run: mypy script_utils.py
